name: Task E - Supply Chain Audit (SBOM)

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  generate-sbom:
    name: Build and Scan Container
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve Task E build context
        id: resolve_context
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "./7021SCN_Coursework_Portfolio/Task_E_Compliance_Supply_Chain/Dockerfile" ]; then
            echo "context=./7021SCN_Coursework_Portfolio/Task_E_Compliance_Supply_Chain" >> "$GITHUB_OUTPUT"
          elif [ -f "./Task_E_Compliance_Supply_Chain/Dockerfile" ]; then
            echo "context=./Task_E_Compliance_Supply_Chain" >> "$GITHUB_OUTPUT"
          else
            echo "Could not find Task E Dockerfile. Repository tree:"
            pwd
            ls -la
            echo "--- Recursive listing (top 3 levels) ---"
            find . -maxdepth 3 -type f | sort
            exit 1
          fi

      - name: Build local container image
        run: docker build -t temp-target:latest "${{ steps.resolve_context.outputs.context }}"

      - name: Run Anchore Syft
        uses: anchore/sbom-action@v0
        with:
          image: "temp-target:latest"
          format: "cyclonedx-json"
          output-file: "sbom.json"

      - name: Save Artifact for Auditors
        uses: actions/upload-artifact@v4
        with:
          name: cyclonedx-sbom
          path: sbom.json
