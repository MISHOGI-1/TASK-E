name: Task E - Supply Chain Audit (SBOM)

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  generate-sbom:
    name: Build and Scan Container
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build local container image
        run: docker build -t temp-target:latest ./7021SCN_Coursework_Portfolio/Task_E_Compliance_Supply_Chain

      - name: Run Anchore Syft
        uses: anchore/sbom-action@v0
        with:
          image: "temp-target:latest"
          format: "cyclonedx-json"
          output-file: "sbom.json"

      - name: Save Artifact for Auditors
        uses: actions/upload-artifact@v4
        with:
          name: cyclonedx-sbom
          path: sbom.json
